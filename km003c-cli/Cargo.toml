[package]
name = "km003c-cli"
version = "0.1.0"
edition = "2024"
rust-version = "1.89"
authors = ["Danila Gornushko <me@okhsunrog.dev>"]
description = "Command-line tools for the ChargerLAB POWER-Z KM003C"
license = "MIT"
repository = "https://github.com/okhsunrog/km003c-rs"

[dependencies]
km003c-lib = { path = "../km003c-lib" }
tokio = { version = "1.45", features = ["full"] }
clap = { version = "4.0", features = ["derive"] }
tracing-subscriber = "0.3"
tracing = "0.1"
usbpd = { git = "https://github.com/okhsunrog/usbpd", rev = "b5dd12e" }
uom = "0.36"
